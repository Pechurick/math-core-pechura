name: Multi-Stage CI/CD Pipeline
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: node test.js

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - run: echo "App build completed on $(date)" > build.txt
      - uses: actions/upload-artifact@v4
        with: { name: app-artifact, path: build.txt }

  deploy_staging:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { name: app-artifact }
      - run: echo "Deploying to Staging..."; cat build.txt

  verify_staging:
    needs: deploy_staging
    runs-on: ubuntu-latest
    steps:
      - name: Smoke Test (INTENTIONAL FAILURE)
        run: |
          echo "Running Smoke Test: 1 == 2"
          if [ 1 -eq 2 ]; then echo "Staging is OK!"; else exit 1; fi

  deploy_production:
    needs: verify_staging
    runs-on: ubuntu-latest
    environment: { name: production }
    steps:
      - uses: actions/download-artifact@v4
        with: { name: app-artifact }
      - run: echo "Deploying to Production..."; cat build.txt
