name: CI Pipeline
on: [pull_request]
jobs:
  test-and-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Linting
        run: npx eslint . --no-eslintrc --env node || true
      - name: Security Scan
        run: npm audit || true
      - name: Unit Test
        run: node test.js
